<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gear List Today by BNG</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
.drive-bar{display:flex;align-items:center;gap:10px;padding:8px 0 4px;margin-bottom:8px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.drive-status{font-size:12px;color:var(--text3);}
.drive-status.ok{color:var(--accent);}
.drive-status.err{color:var(--danger);}
</style>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f4f8;--surface:#ffffff;--surface2:#e4edf5;
  --border:#c5d5e8;--border2:#9ab5d0;
  --text:#0f1e2e;--text2:#2c4a66;--text3:#6a8faa;
  --accent:#1a5fa8;--accent-bg:#ddeaf8;--accent-border:#7ab0de;
  --danger:#c0392b;--danger-bg:#fdf0ee;
  --warn:#b7791f;--warn-bg:#fef3e2;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0d1a26;--surface:#142030;--surface2:#1a2d40;--border:#1e3a52;--border2:#2a5070;
  --text:#d8eaf8;--text2:#8ab8d8;--text3:#3a6080;
  --accent:#4a9ee8;--accent-bg:#0e2a40;--accent-border:#1a4a70;
  --danger:#e05a4a;--danger-bg:#2a1a18;--warn:#d4a030;--warn-bg:#2a2010;
}}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','Meiryo',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}
.container{max-width:1400px;margin:0 auto;padding:1.5rem 1rem;}
.header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:2rem;flex-wrap:wrap;}
.header-left h1{font-size:20px;font-weight:600;letter-spacing:0.02em;color:var(--text);}
.header-left p{font-size:12px;color:var(--text3);margin-top:2px;}
.header-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);padding:6px 14px;font-size:13px;cursor:pointer;color:var(--text);transition:all 0.15s;font-family:inherit;white-space:nowrap;}
.btn:hover{background:var(--surface2);}
.btn:active{transform:scale(0.97);}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-accent:hover{opacity:0.88;background:var(--accent);}
.btn-danger{color:var(--danger);border-color:var(--danger);}
.btn-danger:hover{background:var(--danger-bg);}
.btn-green{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);}
.btn-sm{padding:3px 10px;font-size:12px;}
button:disabled{opacity:0.38;cursor:default;pointer-events:none;}
.plan-row{display:flex;gap:8px;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;}
select.plan-select{border:1px solid var(--border2);border-radius:var(--radius);padding:6px 10px;font-size:13px;color:var(--text);background:var(--surface);font-family:inherit;min-width:200px;cursor:pointer;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1.5rem;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;letter-spacing:0.05em;}
.stat-value{font-size:22px;font-weight:600;color:var(--text);}
.progress{height:3px;background:var(--border);border-radius:2px;margin-top:5px;}
.progress-fill{height:3px;background:var(--accent);border-radius:2px;transition:width 0.4s;}
.tags{margin-bottom:1rem;display:flex;gap:6px;flex-wrap:wrap;}
.tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);font-weight:500;}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:0;overflow:hidden;}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;user-select:none;background:var(--surface2);}
.section-head:hover{background:var(--border);}
.section-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;cursor:pointer;}
.section-title:hover{color:var(--accent);}
.section-badge{font-size:11px;color:var(--text2);font-weight:400;}
.section-arrow{color:var(--text2);font-size:12px;transition:transform 0.2s;cursor:pointer;}
.section-arrow.open{transform:rotate(90deg);}
.move-target-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0;}
.move-target-btn{padding:8px 12px;border:1px solid var(--border2);border-radius:var(--border-radius-md,8px);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;text-align:left;font-family:inherit;}
.move-target-btn:hover{background:var(--accent-bg);border-color:var(--accent-border);}
.move-target-btn.current{background:var(--accent);border-color:var(--accent);color:#fff;cursor:default;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem;align-items:start;}
.cat-col{display:flex;flex-direction:column;gap:12px;}
@media(max-width:640px){.cat-grid{grid-template-columns:1fr;}}
.col-headers{display:grid;grid-template-columns:3fr 42px 52px 44px 60px 36px 44px;gap:6px;padding:4px 12px;border-top:1px solid var(--border);background:var(--surface2);}
.col-headers span{font-size:10px;color:var(--text2);letter-spacing:0.04em;font-weight:600;}
.item-row{display:grid;grid-template-columns:3fr 42px 52px 44px 60px 36px 44px;gap:6px;align-items:center;padding:5px 12px;border-top:1px solid var(--border);transition:background 0.1s;}
.item-row:hover{background:var(--surface2);}
.item-row.excluded{opacity:0.38;}
.toggle-btn{font-size:11px;padding:2px 6px;border-radius:20px;border:1px solid var(--border2);cursor:pointer;font-family:inherit;white-space:nowrap;}
.toggle-btn.active{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);}
.toggle-btn.inactive{background:var(--surface2);border-color:var(--border);color:var(--text3);}
.print-checkbox{display:none;}
@media print{.print-checkbox{display:inline-block!important;}}
input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--accent);}
.item-name{font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.item-name.checked{text-decoration:line-through;color:var(--text3);}
.num-input{border:1px solid var(--border);border-radius:6px;padding:2px 3px;font-size:11px;width:100%;text-align:center;color:var(--text);background:var(--surface);font-family:inherit;}
.num-input:focus{outline:none;border-color:var(--accent);}
.memo-input{border:1px solid var(--border);border-radius:6px;padding:2px 6px;font-size:11px;width:100%;color:var(--text2);background:var(--surface);font-family:inherit;}
.memo-input:focus{outline:none;border-color:var(--accent);}
.add-row{display:flex;gap:6px;padding:6px 12px;border-top:1px solid var(--border);}
.add-row input{flex:1;border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;font-size:12px;color:var(--text);background:var(--surface);font-family:inherit;}
.add-row input:focus{outline:none;border-color:var(--accent);}
.empty-cat{padding:12px 14px;font-size:12px;color:var(--text3);font-style:italic;}
.toolbar{margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:12px;}
.toolbar-label{font-size:11px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;}
.toolbar-btns{display:flex;gap:8px;flex-wrap:wrap;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:1.75rem;width:380px;max-width:100%;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:17px;font-weight:600;margin-bottom:1.25rem;color:var(--text);}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;}
.modal-label{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500;}
.modal-section{margin-bottom:1.25rem;}
.modal input[type=text]{width:100%;border:1px solid var(--border2);border-radius:var(--radius);padding:8px 11px;font-size:14px;color:var(--text);background:var(--surface);font-family:inherit;}
.modal input[type=text]:focus{outline:none;border-color:var(--accent);}
.steps{display:flex;align-items:center;gap:6px;margin-bottom:1.5rem;}
.step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:1.5px solid var(--border2);color:var(--text3);background:var(--surface2);flex-shrink:0;}
.step-dot.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.step-dot.done{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);}
.step-line{flex:1;height:1px;background:var(--border);}
.chip-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:7px 12px 7px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--border2);color:var(--text);background:var(--surface);transition:all 0.15s;font-family:inherit;}
.chip:hover{background:var(--surface2);}
.chip.selected{background:var(--accent);border-color:var(--accent);color:#fff;}
.chip-del{background:none;border:none;cursor:pointer;font-size:13px;line-height:1;padding:0 0 0 2px;color:inherit;opacity:0.5;font-family:inherit;}
.chip-del:hover{opacity:1;}
.chip-add-row{display:flex;gap:6px;margin-top:4px;}
.chip-add-row input{flex:1;border:1px solid var(--border);border-radius:var(--radius);padding:5px 8px;font-size:13px;color:var(--text);background:var(--surface);font-family:inherit;}
.chip-add-row input:focus{outline:none;border-color:var(--accent);}
.name-preview{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;font-size:15px;font-weight:600;color:var(--text);margin-bottom:10px;min-height:42px;}
.share-box{border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:11px;color:var(--text2);background:var(--surface2);word-break:break-all;margin:8px 0;max-height:90px;overflow-y:auto;font-family:monospace;}
.notice{font-size:12px;color:var(--accent);padding:6px 0 10px;font-weight:500;}
.warn-text{font-size:12px;color:var(--warn);margin-bottom:8px;}
@media print{
  body{background:#fff;color:#000;}
  .no-print{display:none!important;}
  .container{max-width:100%;padding:0.5rem;}
  .cat-grid{display:grid!important;grid-template-columns:1fr 1fr!important;gap:8px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .cat-col{display:flex;flex-direction:column;gap:8px;}
  body.hide-bw .stat:first-child{display:none!important;}
  .section{border:1px solid #999;page-break-inside:avoid;margin-bottom:0;}
  .section-head{background:#c8daea!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;border-bottom:1px solid #7ab0de;}
  .section-title{color:#0a3a6a!important;}
  .section-badge{color:#1a5a8a!important;}
  .col-headers{background:#ddeaf8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;grid-template-columns:1fr 32px 48px 32px!important;}
  .col-headers span{color:#0a3a6a!important;}
  .item-row{padding:3px 10px;grid-template-columns:1fr 32px 48px 32px!important;}
  .item-row.excluded{display:none!important;}
  .num-input,.memo-input{border:none;background:transparent;font-size:11px;}
  .stats{margin-bottom:1rem;}
  .stat{border:1px solid #999;padding:8px 12px;}
  .stat-value{font-size:18px;}
  .print-header{display:block!important;}
  .print-checkbox{display:inline-block!important;}
  input[type=checkbox]{width:12px;height:12px;}
  .toggle-btn{display:none!important;}
}
.print-header{display:none;font-size:11px;color:#666;margin-bottom:0.5rem;border-bottom:1px solid #ccc;padding-bottom:0.5rem;}
</style>
</head>
<body>
<div class="container">
  <div class="print-header" id="printHeader"></div>
  <div class="header no-print">
    <div class="header-left">
      <h1>Gear List Today</h1>
      <p>プランを選んで装備を管理・チェック</p>
    </div>
    <div class="header-right">
      <button class="btn btn-green" id="driveLoginBtn" onclick="driveLogin()" style="display:none">Googleでログイン</button>
      <button class="btn" id="driveSaveBtn" onclick="driveSave()" style="display:none">ドライブに保存</button>
      <span class="drive-status" id="driveStatus"></span>
      <button class="btn btn-green" onclick="showModal('share')">URLで共有</button>
      <button class="btn" onclick="showModal('sns')">SNS用画像</button>
      <button class="btn" onclick="saveBlogImage()">ブログ用画像</button>
      <button class="btn" onclick="showModal('markdown')">Markdown</button>
      <button class="btn" onclick="exportJSON()">書き出し</button>
      <label class="btn" style="cursor:pointer">読み込む<input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label>
      <button class="btn" id="bwToggleBtn" onclick="toggleShowBW()" style="min-width:90px">BW表示中</button>
      <button class="btn" onclick="printPlan()">印刷</button>
    </div>
  </div>
  <div id="app"></div>
</div>

  }}
};

var LS_KEY = 'gearListToday';
function loadState() {
  try { var h = location.hash.slice(1); if (h) { var d = JSON.parse(decodeURIComponent(atob(h))); if (d && d.plans) return d; } } catch(e) {}
  var keys = [LS_KEY, 'gearV4', 'gearV3'];
  for (var i = 0; i < keys.length; i++) {
    try { var s = localStorage.getItem(keys[i]); if (s) { var d2 = JSON.parse(s); if (d2 && d2.plans) return d2; } } catch(e) {}
  }
  return null;
}
var ini = loadState();
var iniPlans = ini ? ini.plans : JSON.parse(JSON.stringify(SEED));

  cur: iniCur,

var THEME_ORDER = ['gray','navy','skyblue','blue','teal','lime','green','yellow','brown','orange','pink','red','purple'];

function applyTheme(name) {
  var t = THEMES[name] || THEMES.blue;
  var r = document.documentElement.style;
  r.setProperty('--accent', t.accent);
  r.setProperty('--accent-bg', t.accentBg);
  r.setProperty('--accent-border', t.accentBorder);
  r.setProperty('--bg', t.bg);
  r.setProperty('--surface', t.surface);
  r.setProperty('--surface2', t.surface2);
  r.setProperty('--border', t.border);
  r.setProperty('--border2', t.border2);
  r.setProperty('--text', t.text);
  r.setProperty('--text2', t.text2);
  r.setProperty('--text3', t.text3);
}

function save() {
  try { localStorage.setItem(LS_KEY, JSON.stringify({plans:S.plans,cur:S.cur,genres:S.genres,styles:S.styles,destinations:S.destinations,theme:S.theme,nextId:S.nextId})); } catch(e) {}
}
function gc(plan) { var t=0,c=0; Object.values(plan.categories).forEach(function(cat){ cat.forEach(function(i){ if(!i.excluded){t++; if(i.checked) c++;} }); }); return {t:t,c:c}; }
function gw(plan) { var w=0; Object.values(plan.categories).forEach(function(cat){ cat.forEach(function(i){ if(i.weight&&!i.excluded) w += i.weight*(i.qty||1); }); }); return w; }
function gbw(plan) { var w=0; Object.values(plan.categories).forEach(function(cat){ cat.forEach(function(i){ if(i.weight&&!i.bwExcl&&!i.excluded) w += i.weight*(i.qty||1); }); }); return w; }
function fw(g) { return g >= 1000 ? (g/1000).toFixed(1)+' kg' : g+' g'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render() {
  var app = document.getElementById('app');
  var pNames = Object.keys(S.plans);
  var plan = S.plans[S.cur];
  var cc = plan ? gc(plan) : {t:0,c:0};
  var tw = plan ? gw(plan) : 0;
  var bw = plan ? gbw(plan) : 0;
  var pct = cc.t > 0 ? Math.round(cc.c/cc.t*100) : 0;

  var h = '<div class="plan-row no-print">';
  h += '<select class="plan-select" onchange="chPlan(this.value)">';
  pNames.forEach(function(n) { h += '<option value="'+esc(n)+'"'+(n===S.cur?' selected':'')+'>'+esc(n)+'</option>'; });
  h += '</select>';
  h += '<button class="btn btn-accent btn-sm" onclick="openNew()">+ 新規プラン</button>';
  if (pNames.length > 1) h += '<button class="btn btn-danger btn-sm" onclick="delPlan()">削除</button>';
  h += '</div>';

  if (S.notice) h += '<div class="notice">'+esc(S.notice)+'</div>';

  if (plan) {
    h += '<div style="margin-bottom:1rem"><div style="font-size:11px;color:var(--text3);letter-spacing:0.05em;margin-bottom:4px">プラン</div>';
    h += '<div style="font-size:22px;font-weight:600;color:var(--text)">'+esc(S.cur)+'</div></div>';
    h += '<div class="stats">';
    if (S.showBW) h += '<div class="stat"><div class="stat-label">ベースウェイト</div><div class="stat-value">'+fw(bw)+'</div><div style="font-size:11px;color:var(--text3);margin-top:3px">総重量 '+fw(tw)+'</div></div>';
    h += '<div class="stat"><div class="stat-label">装備数</div><div class="stat-value">'+cc.t+'</div></div>';
    h += '<div class="stat"><div class="stat-label">チェック済</div><div class="stat-value">'+cc.c+'/'+cc.t+'</div><div class="progress"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>';
    h += '</div>';

    var tags = [];
    if (plan.genre) tags.push(plan.genre);
    if (plan.style) tags.push(plan.style);
    if (tags.length) {
      h += '<div class="tags">';
      tags.forEach(function(t) { h += '<span class="tag">'+esc(t)+'</span>'; });
      h += '</div>';
    }

    var cats = Object.keys(plan.categories);
    var firstOpen = false;
    var half = Math.ceil(cats.length / 2);
    var leftCats = cats.slice(0, half);
    var rightCats = cats.slice(half);

    function renderCat(cat, idx) {
      var items = plan.categories[cat];
      var open = !S.collapsed[S.cur+'|'+cat];
      var cw = items.reduce(function(s,i){ return s+(i.weight||0)*(i.qty||1); }, 0);
      var showHdr = open && items.length > 0 && !firstOpen;
      if (showHdr) firstOpen = true;
      var catId = String(idx);
      var ch = '<div class="section">';
      ch += '<div class="section-head">';
      ch += '<span class="section-title" onclick="togCat(\''+catId+'\')" style="flex:1;cursor:pointer">'+esc(cat)+'<span class="section-badge">  '+items.length+'点 &middot; '+fw(cw)+'</span></span>';
      ch += '<span style="display:flex;align-items:center;gap:4px" class="no-print">';
      if (idx > 0) ch += '<button class="btn btn-sm" style="padding:2px 7px" onclick="moveCat(\''+catId+'\',-1)" title="上へ">↑</button>';
      if (idx < cats.length-1) ch += '<button class="btn btn-sm" style="padding:2px 7px" onclick="moveCat(\''+catId+'\',1)" title="下へ">↓</button>';
      ch += '<button class="btn btn-sm" onclick="showRenameCat(\''+catId+'\')" title="名前を変更">編集</button>';
      ch += '<button class="btn btn-sm btn-danger" onclick="deleteCat(\''+catId+'\')" title="カテゴリを削除">削除</button>';
      ch += '</span>';
      ch += '<span class="section-arrow'+(open?' open':'')+'" onclick="togCat(\''+catId+'\')" style="cursor:pointer;margin-left:6px">&#9654;</span></div>';
      if (open) {
        if (!items.length) {
          ch += '<div class="empty-cat">装備なし</div>';
        } else {
          if (showHdr) {
            ch += '<div class="col-headers"><span>装備名</span><span style="text-align:center">数量</span><span style="text-align:center">重量(g)</span><span style="text-align:center">BW外</span></div>';
          }
          items.forEach(function(item, itemIdx) {
            var excluded = item.excluded ? true : false;
            var bwOn = item.bwExcl ? true : false;
            ch += '<div class="item-row'+(excluded?' excluded':'')+'">';
            ch += '<div style="display:flex;align-items:center;gap:4px">';
            ch += '<input type="checkbox" class="print-checkbox"'+(item.checked?' checked':'')+' style="width:13px;height:13px;accent-color:var(--accent)" onchange="togChk(\''+catId+'\','+item.id+')">';
            ch += '<input type="text" class="memo-input" value="'+esc(item.name)+'" style="flex:1;'+(excluded?'text-decoration:line-through;color:var(--text3);':item.checked?'text-decoration:line-through;color:var(--text3);':'')+'" onchange="updItem(\''+catId+'\','+item.id+',\'name\',this.value)" title="'+esc(item.memo||'')+'"></div>';
            ch += '<input type="number" class="num-input" value="'+(item.qty||1)+'" min="1" onchange="updItem(\''+catId+'\','+item.id+',\'qty\',this.value)">';
            ch += '<input type="number" class="num-input" value="'+(item.weight||'')+'" placeholder="&mdash;" min="0" onchange="updItem(\''+catId+'\','+item.id+',\'weight\',this.value)">';
            ch += '<div style="text-align:center"><input type="checkbox"'+(bwOn?' checked':'')+' style="width:13px;height:13px;accent-color:var(--warn);cursor:pointer" title="BW除外" onchange="togBW(\''+catId+'\','+item.id+')"></div>';
            ch += '<button class="toggle-btn '+(excluded?'inactive':'active')+' no-print" onclick="togExclude(\''+catId+'\','+item.id+')">'+(excluded?'除外':'使う')+'</button>';
            ch += '<div class="no-print" style="display:flex;flex-direction:column;gap:1px">';
            if (itemIdx > 0) ch += '<button class="btn btn-sm" style="padding:0px 5px;font-size:10px" onclick="moveItem(\''+catId+'\','+item.id+',-1)">↑</button>';
            if (itemIdx < items.length-1) ch += '<button class="btn btn-sm" style="padding:0px 5px;font-size:10px" onclick="moveItem(\''+catId+'\','+item.id+',1)">↓</button>';
            ch += '</div>';
            ch += '<button class="btn btn-danger btn-sm no-print" onclick="delItem(\''+catId+'\','+item.id+')">削除</button>';
            ch += '</div>';
          });
        }
        ch += '<div class="add-row no-print"><input type="text" placeholder="装備名を入力してEnterで追加" id="add_'+catId+'" onkeydown="if(event.key===\'Enter\')addItem(\''+catId+'\')"><button class="btn btn-sm" onclick="addItem(\''+catId+'\')">追加</button></div>';
      }
      ch += '</div>';
      return ch;
    }

    h += '<div class="cat-grid">';
    h += '<div class="cat-col">';
    leftCats.forEach(function(cat){ h += renderCat(cat, cats.indexOf(cat)); });
    h += '</div>';
    h += '<div class="cat-col">';
    rightCats.forEach(function(cat){ h += renderCat(cat, cats.indexOf(cat)); });
    h += '</div>';
    h += '</div>';

    h += '<div class="toolbar no-print"><div style="display:flex;flex-direction:column;gap:6px"><div class="toolbar-label">管理</div>';
    h += '<div class="toolbar-btns"><button class="btn btn-sm" onclick="showModal(\'addCat\')">+ カテゴリ追加</button>';
    h += '<button class="btn btn-sm" onclick="rstChk()">チェックをリセット</button></div></div>';
    h += '<div style="display:flex;flex-direction:column;gap:6px;margin-top:12px"><div class="toolbar-label">テーマカラー</div>';
    h += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
    var themeLabels = {blue:'ブルー', green:'グリーン', orange:'オレンジ', red:'レッド', purple:'パープル', navy:'ネイビー', teal:'ティール', brown:'ブラウン', pink:'ピンク', gray:'グレー', yellow:'イエロー', lime:'黄緑', skyblue:'水色'};
    THEME_ORDER.forEach(function(name) {
      var t = THEMES[name];
      var active = S.theme === name;
      var iconCol = t.iconColor || t.accent;
      h += '<button onclick="setTheme(\''+name+'\')" style="width:28px;height:28px;border-radius:50%;background:'+iconCol+';border:'+(active?'3px solid '+t.text:'2px solid transparent')+';cursor:pointer;outline:'+(active?'2px solid '+t.accentBorder:'none')+'" title="'+themeLabels[name]+'"></button>';
    });
    h += '</div></div></div>';
  }

  app.innerHTML = h;
  renderModal();
}

function catFromId(catId) {
  var plan = S.plans[S.cur];
  var cats = Object.keys(plan.categories);
  var idx = parseInt(catId);
  if (!isNaN(idx) && cats[idx] !== undefined) return cats[idx];
  for (var i = 0; i < cats.length; i++) {
    if (cats[i].replace(/\W/g,'_') === catId) return cats[i];
  }
  return catId;
}

function renderModal() {
  var app = document.getElementById('app');
  if (!S.modal) return;

  if (S.modal === 'newPlan') {
    var step = S.mStep, g = S.mGenre, s = S.mStyle, dest = S.mDest;
    var autoName = (g && s && dest) ? g+'／'+s+'／'+dest : (g && s) ? g+'／'+s : '';
    var name = S.mName || autoName;
    var pNames = Object.keys(S.plans);
    var m = '<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">';
    m += '<h2>新しいプランを作成</h2>';
    m += '<div class="steps">';
    m += '<div class="step-dot '+(step===1?'active':step>1?'done':'')+'" >1</div>';
    m += '<span style="font-size:10px;color:var(--text3)">ジャンル</span><div class="step-line"></div>';
    m += '<div class="step-dot '+(step===2?'active':step>2?'done':'')+'" >2</div>';
    m += '<span style="font-size:10px;color:var(--text3)">スタイル</span><div class="step-line"></div>';
    m += '<div class="step-dot '+(step===3?'active':step>3?'done':'')+'" >3</div>';
    m += '<span style="font-size:10px;color:var(--text3)">行き先</span><div class="step-line"></div>';
    m += '<div class="step-dot '+(step===4?'active':'')+'" >4</div>';
    m += '<span style="font-size:10px;color:var(--text3)">確認</span></div>';
    if (step === 1) {
      m += '<div class="modal-section"><div class="modal-label">ジャンルを選んでください</div><div class="chip-grid">';
      S.genres.forEach(function(gn) { m += '<button class="chip'+(g===gn?' selected':'')+'" onclick="selGenre(\''+esc(gn)+'\')">'+esc(gn)+'<span class="chip-del" onclick="event.stopPropagation();delGenre(\''+esc(gn)+'\')" title="削除">×</span></button>'; });
      m += '</div><div class="chip-add-row"><input type="text" id="newGI" placeholder="ジャンルを新規追加..."><button class="btn btn-sm" onclick="addGenre()">追加</button></div></div>';
      m += '<div class="modal-actions"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn btn-accent" onclick="goStep(2)"'+(g?'':' disabled')+'>次へ →</button></div>';
    } else if (step === 2) {
      m += '<div class="modal-section"><div class="modal-label">スタイルを選んでください</div><div class="chip-grid">';
      S.styles.forEach(function(st) { m += '<button class="chip'+(s===st?' selected':'')+'" onclick="selStyle(\''+esc(st)+'\')">'+esc(st)+'<span class="chip-del" onclick="event.stopPropagation();delStyle(\''+esc(st)+'\')" title="削除">×</span></button>'; });
      m += '</div><div class="chip-add-row"><input type="text" id="newSI" placeholder="スタイルを新規追加..."><button class="btn btn-sm" onclick="addStyle()">追加</button></div></div>';
      m += '<div class="modal-actions"><button class="btn" onclick="goStep(1)">← 戻る</button><button class="btn btn-accent" onclick="goStep(3)"'+(s?'':' disabled')+'>次へ →</button></div>';
    } else if (step === 3) {
      m += '<div class="modal-section"><div class="modal-label">行き先を入力または選んでください</div>';
      m += '<div class="chip-add-row" style="margin-bottom:10px"><input type="text" id="destInp" placeholder="例：長良川、北アルプス..." value="'+esc(dest)+'" oninput="S.mDest=this.value"><button class="btn btn-sm" onclick="setDest()">決定</button></div>';
      if (S.destinations.length > 0) {
        m += '<div class="modal-label">過去の行き先</div><div class="chip-grid">';
        S.destinations.slice().reverse().slice(0,10).forEach(function(d) {
          m += '<button class="chip'+(dest===d?' selected':'')+'" onclick="selDest(\''+esc(d)+'\')">'+esc(d)+'<span class="chip-del" onclick="event.stopPropagation();delDest(\''+esc(d)+'\')" title="削除">×</span></button>';
        });
        m += '</div>';
      }
      m += '</div>';
      m += '<div class="modal-actions"><button class="btn" onclick="goStep(2)">← 戻る</button><button class="btn btn-accent" onclick="goStep(4)"'+(dest?'':' disabled')+'>次へ →</button></div>';
    } else {
      m += '<div class="modal-section"><div class="modal-label">プラン名を確認・編集してください</div>';
      m += '<div class="name-preview">'+esc(name||'―')+'</div>';
      m += '<input type="text" id="planNameInp" value="'+esc(name)+'" placeholder="プラン名" oninput="S.mName=this.value" style="margin-bottom:12px">';
      m += '<div class="modal-label" style="margin-top:4px">テンプレートからコピー（任意）</div>';
      m += '<select id="tmplSrc" style="width:100%;margin-top:6px;border:1px solid var(--border2);border-radius:var(--radius);padding:7px 10px;font-size:13px;color:var(--text);background:var(--surface);font-family:inherit;">';
      m += '<option value="">（ブランクで作成）</option>';
      pNames.forEach(function(n) { m += '<option value="'+esc(n)+'">'+esc(n)+'</option>'; });
      m += '</select></div>';
      m += '<div class="modal-actions"><button class="btn" onclick="goStep(3)">← 戻る</button><button class="btn btn-accent" onclick="createPlan()">作成</button></div>';
    }
    m += '</div></div>';
    app.innerHTML += m;
  }

  if (S.modal === 'moveCat') {
    var movingCat = catFromId(S.modalData||'');
    var plan2 = S.plans[S.cur];
    var allCats = Object.keys(plan2.categories);
    var mm = '<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">';
    mm += '<h2>「'+esc(movingCat)+'」の挿入位置を選んでください</h2>';
    mm += '<div style="display:flex;flex-direction:column;gap:6px;margin:12px 0">';
    allCats.forEach(function(cat, idx) {
      var isCurrent = cat === movingCat;
      if (!isCurrent) {
        mm += '<button class="move-target-btn" onclick="execMoveCatAt('+idx+')">↓ '+esc(cat)+' の前</button>';
      } else {
        mm += '<div style="padding:7px 12px;background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:8px;font-size:13px;color:var(--accent);font-weight:500;">▶ '+esc(cat)+'（現在位置）</div>';
      }

    mm += '</div></div>';
    app.innerHTML += mm;

function genURL() { var p={plans:S.plans,cur:S.cur,genres:S.genres,styles:S.styles,nextId:S.nextId}; return location.href.split('#')[0]+'#'+btoa(encodeURIComponent(JSON.stringify(p))); }
function cpURL() { var u=document.getElementById('shareUrl').textContent; navigator.clipboard.writeText(u).then(function(){ document.getElementById('cpNote').textContent='コピーしました！'; }).catch(function(){ document.getElementById('cpNote').textContent='手動でコピーしてください'; }); }
function exportJSON() { var b=new Blob([JSON.stringify({plans:S.plans,cur:S.cur,genres:S.genres,styles:S.styles,nextId:S.nextId},null,2)],{type:'application/json'}); var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='gear-plans.json'; a.click(); }
function importJSON(e) {
  var f = e.target.files[0]; if (!f) return;
  var r = new FileReader();
  r.onload = function(ev) {
    try {
      var d = JSON.parse(ev.target.result);
      if (d && d.plans) { S.plans=d.plans; S.cur=d.cur||Object.keys(d.plans)[0]; S.genres=d.genres||DEFAULT_GENRES.slice(); S.styles=d.styles||DEFAULT_STYLES.slice(); S.nextId=d.nextId||300; save(); S.notice='インポート完了'; S.modal=null; render(); }
    } catch(err) { alert('読み込みに失敗しました'); }
  };
  r.readAsText(f);
}
function saveCardImage() {
  var card = document.getElementById('shareCard');
  var note = document.getElementById('imgNote');
  if (!card) return;
  note.textContent = '生成中...';
  html2canvas(card, {scale:2, backgroundColor:null, useCORS:true}).then(function(canvas) {
    var a = document.createElement('a');
    a.download = 'gear-list-'+S.cur.replace(/[\/\\]/g,'-')+'.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    note.textContent = '保存しました！';
  }).catch(function() { note.textContent = '保存に失敗しました。もう一度お試しください。'; });
}

function saveBlogImage() {
  var app = document.getElementById('app');
  if (!app) return;
  var t = THEMES[S.theme] || THEMES.blue;
  var origBg = document.body.style.background;
  document.body.style.background = t.bg;
  var wrapper = document.createElement('div');
  wrapper.style.cssText = 'background:'+t.bg+';padding:20px;display:inline-block;min-width:600px;';
  var clone = app.cloneNode(true);
  var noPrints = clone.querySelectorAll('.no-print');
  noPrints.forEach(function(el){ el.remove(); });
  if (!S.showBW) {
    var statEls = clone.querySelectorAll('.stat');
    if (statEls.length > 0) statEls[0].style.display = 'none';
  }
  var catGrids = clone.querySelectorAll('.cat-grid');
  catGrids.forEach(function(el){
    el.style.display='grid';
    el.style.gridTemplateColumns='1fr 1fr';
    el.style.gap='8px';
  });
  var catCols = clone.querySelectorAll('.cat-col');
  catCols.forEach(function(el){
    el.style.display='flex';
    el.style.flexDirection='column';
    el.style.gap='8px';
  });
  var excludedRows = clone.querySelectorAll('.item-row.excluded');
  excludedRows.forEach(function(el){ el.style.display='none'; });
  var itemRows = clone.querySelectorAll('.item-row:not(.excluded)');
  itemRows.forEach(function(el){ el.style.gridTemplateColumns='1fr 32px 48px 32px'; });
  var colHeaders = clone.querySelectorAll('.col-headers');
  colHeaders.forEach(function(el){ el.style.gridTemplateColumns='1fr 32px 48px 32px'; });
  var inputs = clone.querySelectorAll('input[type=text], input[type=number]');
  inputs.forEach(function(el){ el.style.border='none'; el.style.background='transparent'; el.style.outline='none'; });
  var toggleBtns = clone.querySelectorAll('.toggle-btn');
  toggleBtns.forEach(function(el){ el.style.display='none'; });
  wrapper.appendChild(clone);
  wrapper.style.position = 'absolute';
  wrapper.style.left = '-9999px';
  document.body.appendChild(wrapper);
  html2canvas(wrapper, {scale:2, backgroundColor:t.bg, useCORS:true, logging:false}).then(function(canvas) {
    document.body.removeChild(wrapper);
    document.body.style.background = origBg;
    var a = document.createElement('a');
    a.download = 'gear-list-blog-'+S.cur.replace(/[\/\\]/g,'-')+'.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }).catch(function() {
    document.body.removeChild(wrapper);
    document.body.style.background = origBg;
    alert('画像の生成に失敗しました。もう一度お試しください。');
  });
}
function cpMD() {
  var box = document.getElementById('mdBox'); if (!box) return;
  navigator.clipboard.writeText(box.value).then(function(){ document.getElementById('mdNote').textContent='コピーしました！'; }).catch(function(){ box.select(); document.execCommand('copy'); document.getElementById('mdNote').textContent='コピーしました！'; });
}
function printPlan() {
  var ph = document.getElementById('printHeader');
  if (ph) ph.textContent = 'Gear List Today　'+S.cur+'　印刷日：'+new Date().toLocaleDateString('ja-JP');
  if (!S.showBW) document.body.classList.add('hide-bw');
  window.print();
  document.body.classList.remove('hide-bw');
}

function openNew() { S.modal='newPlan'; S.mStep=1; S.mGenre=''; S.mStyle=''; S.mDest=''; S.mName=''; S.notice=''; render(); }
function showModal(n) {
  S.notice='';
  S.modal=n;
  if (n==='sns') { S.snsStep=1; S.snsIcons=[]; S.snsItems={}; S.snsComment=''; S.snsIconTab='アウトドア・スポーツ'; S.snsRows=[{cat:'',items:[]},{cat:'',items:[]},{cat:'',items:[]},{cat:'',items:[]}]; }
  render();
}
function toggleShowBW() {
  S.showBW = !S.showBW;
  var btn = document.getElementById('bwToggleBtn');
  if (btn) btn.textContent = S.showBW ? 'BW表示中' : 'BW非表示';
  render();
}
function setSnsRowCat(ri, cat) {
  if (!S.snsRows) S.snsRows=[{cat:'',items:[]},{cat:'',items:[]},{cat:'',items:[]},{cat:'',items:[]}];
  S.snsRows[ri] = {cat:cat, items:[]};
  render();
}
function toggleSnsRowItem(ri, id) {
  if (!S.snsRows) return;
  var row = S.snsRows[ri];
  var idx = row.items.indexOf(id);
  if (idx >= 0) { row.items.splice(idx,1); }
  else if (row.items.length < 4) { row.items.push(id); }
  render();
}
function goSnsStep(n) { S.snsStep=n; render(); }
function toggleSnsIcon(ic) {
  var idx = S.snsIcons.indexOf(ic);
  if (idx >= 0) { S.snsIcons.splice(idx,1); }
  else if (S.snsIcons.length < 3) { S.snsIcons.push(ic); }
  render();
}
function swapSnsIcon(i) {
  if (i < S.snsIcons.length-1) {
    var tmp = S.snsIcons[i]; S.snsIcons[i]=S.snsIcons[i+1]; S.snsIcons[i+1]=tmp;
  }
  render();
}
function toggleSnsItem(key) {
  if (!S.snsItems) S.snsItems={};
  S.snsItems[key] = !S.snsItems[key];
  render();
}
function closeModal() { S.modal=null; render(); }
function goStep(n) { S.mStep=n; render(); }
function selGenre(g) { S.mGenre=g; S.mName=''; render(); }
function selStyle(s) { S.mStyle=s; S.mName=''; render(); }
function selDest(d) { S.mDest=d; S.mName=''; render(); }
function setDest() { var el=document.getElementById('destInp'); var v=el?el.value.trim():''; if(!v)return; S.mDest=v; render(); }
function addGenre() { var el=document.getElementById('newGI'); var v=el?el.value.trim():''; if(!v||S.genres.indexOf(v)>=0)return; S.genres.push(v); save(); render(); }
function addStyle() { var el=document.getElementById('newSI'); var v=el?el.value.trim():''; if(!v||S.styles.indexOf(v)>=0)return; S.styles.push(v); save(); render(); }
function delGenre(v) { if(!confirm('「'+v+'」をジャンル一覧から削除しますか？'))return; S.genres=S.genres.filter(function(x){return x!==v;}); if(S.mGenre===v)S.mGenre=''; save(); render(); }
function delStyle(v) { if(!confirm('「'+v+'」をスタイル一覧から削除しますか？'))return; S.styles=S.styles.filter(function(x){return x!==v;}); if(S.mStyle===v)S.mStyle=''; save(); render(); }
function delDest(v) { if(!confirm('「'+v+'」を行き先履歴から削除しますか？'))return; S.destinations=S.destinations.filter(function(x){return x!==v;}); if(S.mDest===v)S.mDest=''; save(); render(); }
function createPlan() {
  var el = document.getElementById('planNameInp'); var name = el ? el.value.trim() : ''; if (!name) return;
  var tmpl = document.getElementById('tmplSrc').value;
  var cats;
  if (tmpl && S.plans[tmpl]) {
    cats = JSON.parse(JSON.stringify(S.plans[tmpl].categories));
    Object.values(cats).forEach(function(c){ c.forEach(function(i){ i.checked=false; }); });
  } else { cats={}; DEFAULT_CATS.forEach(function(c){ cats[c]=[]; }); }
  S.plans[name] = {genre:S.mGenre, style:S.mStyle, dest:S.mDest, categories:cats};
  if (S.mDest && S.destinations.indexOf(S.mDest) < 0) S.destinations.push(S.mDest);
  S.cur = name; S.modal = null; save(); render();
}
function chPlan(n) { S.cur=n; S.notice=''; render(); }
function togCat(catId) {
  var cat = catFromId(catId);
  var k = S.cur+'|'+cat; S.collapsed[k]=!S.collapsed[k]; render();
}
function togChk(catId, id) {
  var cat = catFromId(catId);
  var item = S.plans[S.cur].categories[cat].find(function(i){ return i.id===id; });
  if (item) { item.checked=!item.checked; save(); render(); }
}
function updItem(catId, id, f, v) {
  var cat = catFromId(catId);
  var item = S.plans[S.cur].categories[cat].find(function(i){ return i.id===id; });
  if (!item) return;
  if (f==='qty'||f==='weight') item[f]=parseInt(v)||0; else item[f]=v;
  save(); if (f==='weight'||f==='qty') render();
}
function delItem(catId, id) {
  var cat = catFromId(catId);
  S.plans[S.cur].categories[cat] = S.plans[S.cur].categories[cat].filter(function(i){ return i.id!==id; });
  save(); render();
}
function addItem(catId) {
  var cat = catFromId(catId);
  var el = document.getElementById('add_'+catId);
  if (!el||!el.value.trim()) return;
  S.plans[S.cur].categories[cat].push({id:S.nextId++, name:el.value.trim(), qty:1, weight:0, memo:'', checked:false});
  save(); render();
}
function rstChk() { Object.values(S.plans[S.cur].categories).forEach(function(c){ c.forEach(function(i){ i.checked=false; }); }); save(); render(); }
function togBW(catId, id) {
  var cat = catFromId(catId);
  var item = S.plans[S.cur].categories[cat].find(function(i){ return i.id===id; });
  if (item) { item.bwExcl = !item.bwExcl; save(); render(); }
}
function togExclude(catId, id) {
  var cat = catFromId(catId);
  var item = S.plans[S.cur].categories[cat].find(function(i){ return i.id===id; });
  if (item) { item.excluded = !item.excluded; save(); render(); }
}
function moveItem(catId, id, dir) {
  var cat = catFromId(catId);
  var items = S.plans[S.cur].categories[cat];
  var idx = items.findIndex(function(i){ return i.id===id; });
  var newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= items.length) return;
  items.splice(newIdx, 0, items.splice(idx, 1)[0]);
  save(); render();
}
function addCat() { var el=document.getElementById('newCatN'); var n=el?el.value.trim():''; if(!n)return; S.plans[S.cur].categories[n]=[]; S.modal=null; save(); render(); }
function delPlan() { if(!confirm('「'+S.cur+'」を削除しますか？'))return; delete S.plans[S.cur]; S.cur=Object.keys(S.plans)[0]; save(); render(); }

function showMoveCat(catId) {
  S.modal = 'moveCat';
  S.modalData = catId;
  render();
}

function execMoveCatAt(insertIdx) {
  var srcCatId = S.modalData;
  var plan = S.plans[S.cur];
  var keys = Object.keys(plan.categories);
  var srcIdx = keys.findIndex(function(k){ return k.replace(/\W/g,'_') === srcCatId; });
  if (srcIdx < 0) { closeModal(); return; }
  var srcKey = keys.splice(srcIdx, 1)[0];
  var targetIdx = insertIdx > srcIdx ? insertIdx - 1 : insertIdx;
  if (targetIdx > keys.length) targetIdx = keys.length;
  keys.splice(targetIdx, 0, srcKey);
  var newCats = {};
  keys.forEach(function(k){ newCats[k] = plan.categories[k]; });
  plan.categories = newCats;
  S.modal = null;
  save(); render();
}

function moveCat(catId, dir) {
  var plan = S.plans[S.cur];
  var keys = Object.keys(plan.categories);
  var idx = parseInt(catId);
  if (isNaN(idx)) return;
  var newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= keys.length) return;
  var newCats = {};
  keys.splice(newIdx, 0, keys.splice(idx, 1)[0]);
  keys.forEach(function(k){ newCats[k] = plan.categories[k]; });
  plan.categories = newCats;
  save(); render();
}

function showRenameCat(catId) {
  S.modal = 'renameCat';
  S.modalData = catId;
  render();
}

function execRenameCat() {
  var el = document.getElementById('renameCatInp');
  var newName = el ? el.value.trim() : '';
  if (!newName) return;
  var oldName = catFromId(S.modalData||'');
  if (newName === oldName) { closeModal(); return; }
  if (S.plans[S.cur].categories[newName] !== undefined) { alert('同じ名前のカテゴリが既にあります'); return; }
  var plan = S.plans[S.cur];
  var newCats = {};
  Object.keys(plan.categories).forEach(function(k) {
    newCats[k === oldName ? newName : k] = plan.categories[k];
  });
  plan.categories = newCats;
  S.modal = null;
  save(); render();
}

function deleteCat(catId) {
  var cat = catFromId(catId);
  var items = S.plans[S.cur].categories[cat];
  if (items && items.length > 0) {
    if (!confirm('「'+cat+'」には'+items.length+'点の装備があります。カテゴリごと削除しますか？')) return;
  } else {
    if (!confirm('「'+cat+'」を削除しますか？')) return;
  }
  delete S.plans[S.cur].categories[cat];
  save(); render();
}

function setTheme(name) {
  S.theme = name;
  applyTheme(name);
  save(); render();
}

var GAPI_CLIENT_ID = '588269285235-jgjj5fs849jsbpn69h862ac895clvulb.apps.googleusercontent.com';
var GAPI_SCOPE = 'https://www.googleapis.com/auth/drive.appdata';
var DRIVE_FILE_NAME = 'gear-list-today.json';
var driveToken = null;
var driveFileId = null;
var driveSaveTimer = null;

function driveSetStatus(msg, cls) {
  var el = document.getElementById('driveStatus');
  if (!el) return;
  el.textContent = msg;
  el.className = 'drive-status' + (cls ? ' '+cls : '');
}

function driveLogin() {
  google.accounts.oauth2.initTokenClient({
    client_id: GAPI_CLIENT_ID,
    scope: GAPI_SCOPE,
    callback: function(resp) {
      if (resp.error) { driveSetStatus('ログイン失敗', 'err'); return; }
      driveToken = resp.access_token;
      document.getElementById('driveLoginBtn').style.display = 'none';
      document.getElementById('driveSaveBtn').style.display = '';
      driveSetStatus('読み込み中...', '');
      driveLoad();
    }
  }).requestAccessToken();
}

function driveLoad() {
  fetch('https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%22'+DRIVE_FILE_NAME+'%22&fields=files(id,name)', {
    headers: { Authorization: 'Bearer '+driveToken }
  }).then(function(r){ return r.json(); }).then(function(d) {
    if (d.files && d.files.length > 0) {
      driveFileId = d.files[0].id;
      fetch('https://www.googleapis.com/drive/v3/files/'+driveFileId+'?alt=media', {
        headers: { Authorization: 'Bearer '+driveToken }
      }).then(function(r){ return r.json(); }).then(function(data) {
        if (data && data.plans) {
          S.plans = data.plans;
          S.cur = (data.cur && S.plans[data.cur]) ? data.cur : Object.keys(S.plans)[0];
          S.genres = data.genres || S.genres;
          S.styles = data.styles || S.styles;
          S.destinations = data.destinations || S.destinations;
          S.nextId = data.nextId || S.nextId;
          save();
          driveSetStatus('同期済み ✓', 'ok');
          render();
        }
      }).catch(function(){ driveSetStatus('読み込み失敗', 'err'); });
    } else {
      driveSetStatus('新規ファイルを作成します...', '');
      driveSave();
    }
  }).catch(function(){ driveSetStatus('接続失敗', 'err'); });
}

function driveSave() {
  if (!driveToken) return;
  driveSetStatus('保存中...', '');
  var data = JSON.stringify({plans:S.plans,cur:S.cur,genres:S.genres,styles:S.styles,destinations:S.destinations,nextId:S.nextId});
  var boundary = 'glt_boundary_xyz';
  var meta = driveFileId ? JSON.stringify({name:DRIVE_FILE_NAME}) : JSON.stringify({name:DRIVE_FILE_NAME,parents:['appDataFolder']});
  var body = '--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+meta+'\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+data+'\r\n--'+boundary+'--';
  var method = driveFileId ? 'PATCH' : 'POST';
  var url = driveFileId
    ? 'https://www.googleapis.com/upload/drive/v3/files/'+driveFileId+'?uploadType=multipart'
    : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  fetch(url, {
    method: method,
    headers: { Authorization: 'Bearer '+driveToken, 'Content-Type': 'multipart/related; boundary='+boundary },
    body: body
  }).then(function(r){ return r.json(); }).then(function(d) {
    if (d.id) { driveFileId = d.id; driveSetStatus('保存済み ✓', 'ok'); }
    else { driveSetStatus('保存失敗', 'err'); }
  }).catch(function(){ driveSetStatus('保存失敗', 'err'); });
}

function driveAutoSave() {
  if (!driveToken) return;
  clearTimeout(driveSaveTimer);
  driveSaveTimer = setTimeout(driveSave, 2000);
}

var _origSave = save;
save = function() { _origSave(); driveAutoSave(); };

window.addEventListener('load', function() {
  applyTheme(S.theme);
  setTimeout(function() {
    document.getElementById('driveLoginBtn').style.display = '';
    driveSetStatus('Googleにログインするとデータが自動同期されます', '');
  }, 500);
});

render();
</script>
